name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: 29.4

      - name: Install Emacs package dependencies
        run: |
          emacs -Q --batch \
            --eval "(require 'package)" \
            --eval "(setq package-archives '((\"gnu\" . \"https://elpa.gnu.org/packages/\") (\"nongnu\" . \"https://elpa.nongnu.org/nongnu/\") (\"melpa\" . \"https://melpa.org/packages/\")))" \
            --eval "(package-initialize)" \
            --eval "(package-refresh-contents)" \
            --eval "(dolist (pkg '(websocket webdriver magit)) (unless (package-installed-p pkg) (package-install pkg)))"

      - name: Byte-compile
        run: make

      - name: Run ERT
        run: make test
